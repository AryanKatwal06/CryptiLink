name: Phase 1 Architecture Checks

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

jobs:
  phase1:
    name: Phase 1 verification
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install CryptiLink deps
        working-directory: ./CryptiLink
        run: npm ci

      - name: Run Phase 1 verifier
        working-directory: ./CryptiLink
        run: npm run verify:phase1

      - name: Generate depcruise report
        working-directory: ./CryptiLink
        run: |
          mkdir -p .gha
          npx depcruise --config .dependency-cruiser.js mobile -f json -o .gha/depcruise.json || true

      - name: Generate ESLint report
        working-directory: ./CryptiLink
        run: |
          mkdir -p .gha
          npx eslint . --ext .js,.ts,.tsx -f json -o .gha/eslint-report.json || true

      - name: Upload Phase 1 report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase-1-report
          path: ./CryptiLink/docs/phase-1-report.md

      - name: Upload ESLint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eslint-report
          path: ./CryptiLink/.gha/eslint-report.json

      - name: Upload depcruise report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: depcruise-report
          path: ./CryptiLink/.gha/depcruise.json
