name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          persist-credentials: true
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: |
          cd PaySys
          npm ci || npm install
      - name: Validate docker-compose
        run: |
          cd PaySys
          docker compose config || echo "docker not available"
      - name: Lint
        run: |
          cd PaySys
          npm run lint || echo "No lint configured"
      - name: Format check
        run: |
          cd PaySys
          npm run format || echo "No format configured"
      - name: Build
        run: |
          cd PaySys
          npm run build || echo "No build configured"
