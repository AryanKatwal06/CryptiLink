name: Phase 2 CI - Mobile Verification

on:
  push:
    paths:
      - "CryptiLink/**"
  pull_request:
    paths:
      - "CryptiLink/**"

concurrency:
  group: phase-2-ci
  cancel-in-progress: true

jobs:
  verify-phase-2:
    name: Verify Phase 2 Mobile Foundation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies (CryptiLink)
        run: npm ci
        working-directory: CryptiLink

      - name: Run dependency-cruiser
        run: npm run depcruise
        working-directory: CryptiLink

      - name: Run mobile smoke tests
        run: npm run test:mobile:smoke
        working-directory: CryptiLink

      - name: Run Phase 2 verification script
        run: npm run verify:phase2
        working-directory: CryptiLink

      - name: Upload Phase 2 report
        uses: actions/upload-artifact@v4
        with:
          name: phase-2-report
          path: CryptiLink/mobile/docs/phase-2-report.md
