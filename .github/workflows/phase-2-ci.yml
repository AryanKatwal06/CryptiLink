name: Phase 2 CI - Mobile Verification

on:
  push:
    paths:
      - 'PaymentsApp/**'
  pull_request:
    paths:
      - 'PaymentsApp/**'

concurrency:
  group: phase-2-ci
  cancel-in-progress: true

jobs:
  verify-phase-2:
    name: Verify Phase 2 Mobile Foundation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (PaymentsApp)
        run: npm ci
        working-directory: PaymentsApp

      - name: Run dependency-cruiser
        run: npm run depcruise
        working-directory: PaymentsApp

      - name: Run mobile smoke tests
        run: npm run test:mobile:smoke
        working-directory: PaymentsApp

      - name: Run Phase 2 verification script
        run: npm run verify:phase2
        working-directory: PaymentsApp

      - name: Upload Phase 2 report
        uses: actions/upload-artifact@v4
        with:
          name: phase-2-report
          path: PaymentsApp/mobile/docs/phase-2-report.md
