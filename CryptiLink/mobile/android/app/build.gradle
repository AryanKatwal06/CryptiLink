apply plugin: 'com.android.application'
apply plugin: 'org.jetbrains.kotlin.android'
apply plugin: 'com.google.gms.google-services'

def readEnvValue = { String key ->
    def envFile = rootProject.file('../../.env')
    if (!envFile.exists()) {
        return null
    }

    def properties = new java.util.Properties()
    envFile.withInputStream { input ->
        properties.load(input)
    }
    return properties.getProperty(key)
}

android {
    namespace 'com.cryptilink.app'
    compileSdk 33

    defaultConfig {
        applicationId "com.cryptilink.app"
        minSdk 24
        targetSdk 33
        versionCode 1
        versionName "1.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    signingConfigs {
        release {
            def keystoreFileName = readEnvValue('ANDROID_KEYSTORE_FILE') ?: 'cryptilink-release.keystore'
            def releaseStorePassword = readEnvValue('ANDROID_STORE_PASSWORD')
            def releaseKeyAlias = readEnvValue('ANDROID_KEY_ALIAS')
            def releaseKeyPassword = readEnvValue('ANDROID_KEY_PASSWORD')

            storeFile file("${projectDir}/$keystoreFileName")
            storePassword = releaseStorePassword
            keyAlias = releaseKeyAlias
            keyPassword = releaseKeyPassword
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
            shrinkResources false
        }
    }
}

dependencies {
    testImplementation "junit:junit:4.13.2"
    testImplementation "org.bouncycastle:bcprov-jdk15on:1.70"
    testImplementation "org.robolectric:robolectric:4.11.1"
    implementation 'com.facebook.react:react-android:0.74.5'
}

